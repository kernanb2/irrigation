<VirtualHost *:80>
    ServerName irrigation.paradisepond.tech
    Redirect permanent / https://irrigation.paradisepond.tech/
</VirtualHost>

<VirtualHost *:443>
    ServerName irrigation.paradisepond.tech
    DocumentRoot /var/www/irrigation/backend/public

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/irrigation.paradisepond.tech/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/irrigation.paradisepond.tech/privkey.pem

    <Directory /var/www/irrigation/backend/public>
        Options -Indexes
        AllowOverride All
        Require all granted
    </Directory>

    # Block direct access to backend internals
    <DirectoryMatch "/var/www/irrigation/backend/(config|src|cron|db)">
        Require all denied
    </DirectoryMatch>

    ErrorLog  ${APACHE_LOG_DIR}/irrigation_error.log
    CustomLog ${APACHE_LOG_DIR}/irrigation_access.log combined
</VirtualHost>
